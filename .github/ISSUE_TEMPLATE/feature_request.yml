name: "\U0001F4A1 功能请求 / Feature Request"
description: 建议一个新功能 / Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: 使用场景 / Use Case
      description: 描述你想解决的问题或使用场景 / Describe the problem or use case you want to solve
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Proposed Solution
      description: 描述你期望的功能行为 / Describe the behavior you expect
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 你考虑过的其他方案（可选） / Other solutions you have considered (optional)
